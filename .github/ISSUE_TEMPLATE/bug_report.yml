name: Bug Report
description: Report a bug or unexpected behavior in RedForge
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: RedForge Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - openai
        - anthropic
        - gemini
        - ollama
        - bedrock
        - azure
        - mistral
        - generic_rest
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `redforge scan --provider ...`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: Paste relevant logs here. **Redact any API keys.**
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have redacted any API keys or sensitive data from logs
          required: true
