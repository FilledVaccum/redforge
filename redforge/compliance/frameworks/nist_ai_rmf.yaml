# NIST AI Risk Management Framework 1.0 — RedForge Compliance Mapping
#
# Source: https://airc.nist.gov/RMF/Framework
# To customize: copy this file to ~/.redforge/compliance/nist_ai_rmf.yaml
# and edit.  Your version will override this built-in one.
#
# Format:
#   framework_id: Unique identifier (used in --compliance flag and API)
#   name:         Display name
#   version:      Framework version
#   url:          Official reference URL
#   description:  One-line summary
#   mappings:
#     <OWASP_LLM_ID>:
#       - control_id:   Framework control identifier
#         control_name: Short name of the control
#         description:  What the control requires
#         severity:     How serious a violation of this control is
#         remediation:  How to address the gap

framework_id: NIST_AI_RMF
name: NIST AI Risk Management Framework 1.0
version: "1.0"
url: https://airc.nist.gov/RMF/Framework
description: >
  NIST framework for identifying, assessing, and managing AI risks across
  the AI lifecycle. Structured around four functions: GOVERN, MAP, MEASURE, MANAGE.

mappings:
  LLM01:
    - control_id: GOVERN-1.1
      control_name: AI Risk Policy
      description: >
        Policies, processes, procedures, and practices across the organization
        related to the mapping, measuring, and managing of AI risks are
        documented and communicated.
      severity: high
      remediation: >
        Implement input validation, system prompt hardening, and red-team testing
        as documented organizational policy. Define accountability for prompt injection
        risk ownership.

    - control_id: MAP-1.5
      control_name: Risk Identification
      description: >
        Organizational risk tolerances are determined and communicated clearly
        to relevant AI risk management teams.
      severity: high
      remediation: >
        Classify prompt injection as a documented organizational risk. Define
        acceptable risk tolerance levels and communicate to development teams.

    - control_id: MEASURE-2.6
      control_name: AI Risk Measurement
      description: >
        The risk or magnitude of harms resulting from AI system failures
        are evaluated and logged.
      severity: critical
      remediation: >
        Quantify the blast radius of prompt injection exploitation. Measure
        against defined risk appetite. Include adversarial testing metrics in
        AI risk dashboards.

  LLM02:
    - control_id: MANAGE-2.2
      control_name: Data Management
      description: >
        Mechanisms are in place to document and manage all data used in and
        produced by AI systems.
      severity: critical
      remediation: >
        Implement output filtering for PII. Deploy data loss prevention on
        model outputs before they reach end users.

    - control_id: MAP-3.5
      control_name: Privacy Risks
      description: >
        Risks to individuals' privacy are identified, prioritized, and
        documented in AI impact assessments.
      severity: critical
      remediation: >
        Audit training data for PII memorization. Implement differential privacy
        techniques. Log all sensitive data access requests.

  LLM03:
    - control_id: MAP-2.1
      control_name: Scientific Knowledge
      description: >
        Scientific grounding and trustworthiness of AI system capabilities
        and limitations are assessed and communicated.
      severity: high
      remediation: >
        Validate RAG retrieval integrity. Implement source verification and
        provenance tracking. Audit vector store contents for poisoned documents.

  LLM04:
    - control_id: GOVERN-5.1
      control_name: Supply Chain Risk
      description: >
        AI supply chain risks are identified, owned, managed, and monitored
        throughout the AI lifecycle.
      severity: critical
      remediation: >
        Audit all AI/ML dependencies. Pin versions and use SBOMs. Scan for
        supply chain tampering. Verify model checksums before deployment.

  LLM05:
    - control_id: MEASURE-2.5
      control_name: Output Quality
      description: >
        The quality and relevance of AI system outputs are evaluated against
        defined criteria throughout the system lifecycle.
      severity: high
      remediation: >
        Implement output sanitization. Scan generated code for malicious
        patterns before execution. Require human review of high-risk outputs.

  LLM06:
    - control_id: MAP-1.6
      control_name: Autonomous Actions
      description: >
        Risks of AI systems taking uncontrolled or unintended autonomous
        actions are identified and documented.
      severity: critical
      remediation: >
        Implement principle of least privilege for AI agents. Require human
        approval for high-impact actions. Define clear action boundaries.

    - control_id: MANAGE-1.3
      control_name: Risk Response
      description: >
        Responses to identified AI risks are prioritized and implemented based
        on potential impact and likelihood.
      severity: critical
      remediation: >
        Deploy agent sandboxing and action approval workflows. Implement
        comprehensive audit logging for all agent actions.

  LLM07:
    - control_id: GOVERN-2.2
      control_name: Explainability
      description: >
        Mechanisms exist to explain AI system decisions and states to relevant
        stakeholders.
      severity: medium
      remediation: >
        Review all information included in system prompts. Avoid embedding
        credentials or sensitive configuration in system prompts.

  LLM08:
    - control_id: MEASURE-1.1
      control_name: AI Testing
      description: >
        AI system testing is performed regularly and results are documented
        and available to authorized stakeholders.
      severity: medium
      remediation: >
        Test embedding models for inversion attacks. Use differential privacy
        in embedding generation. Audit vector search results for anomalies.

  LLM09:
    - control_id: MEASURE-2.7
      control_name: AI Accuracy
      description: >
        AI system accuracy, reliability, and performance are evaluated and
        documented throughout the lifecycle.
      severity: high
      remediation: >
        Implement factual grounding requirements and citation mandates.
        Deploy uncertainty quantification. Monitor hallucination rates in
        production with automated fact-checking pipelines.

  LLM10:
    - control_id: MANAGE-2.4
      control_name: Incident Response
      description: >
        Mechanisms for AI incident detection, response, and recovery are
        documented and regularly tested.
      severity: high
      remediation: >
        Monitor for many-shot prompt patterns. Implement sliding window
        detection on input length. Add rate limiting on context accumulation.
